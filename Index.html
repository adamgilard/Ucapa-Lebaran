<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucapan Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a2a3a, #0b0f1a);
    color: white;
    overflow: hidden;
    text-align: center;
}

/* CANVAS BINTANG */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* Opening */
#opening {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#opening button {
    padding: 15px 25px;
    font-size: 18px;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Content */
.container {
    position: relative;
    z-index: 2;
    padding: 40px 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    font-size: 26px;
}

.nama {
    margin-top: 10px;
    font-size: 22px;
    color: gold;
}

/* FOTO */
.foto {
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.9);
    transition: 1s;
}

.foto img {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid gold;
}

.foto.show {
    opacity: 1;
    transform: scale(1);
}

/* TEXT */
#text {
    margin-top: 20px;
    font-size: 17px;
    line-height: 1.6;
    min-height: 120px;
}

.glow {
    text-shadow: 0 0 10px gold, 0 0 20px gold;
}
</style>
</head>

<body>

<!-- BINTANG -->
<canvas id="stars"></canvas>

<!-- OPENING -->
<div id="opening">
    <button onclick="start()">Buka Ucapan ✨</button>
</div>

<!-- CONTENT -->
<div class="container" id="content">
    <h1 class="glow">🌙 Selamat Hari Raya Idul Fitri 🌙</h1>
    <div class="nama" id="nama"></div>

    <div class="foto" id="foto">
        <!-- GANTI LINK FOTO DI SINI -->
        <img src="https://i.imgur.com/foto-mayang.jpg">
    </div>

    <div id="text"></div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// ================== NAMA ==================
const params = new URLSearchParams(window.location.search);
const nama = params.get("nama") || "Sahabat";
document.getElementById("nama").innerText = "Untuk: " + nama;

// ================== TEXT ==================
const message = `Minal aidin wal faizin, ${nama} and family.

I sincerely apologize for any mistakes I may have made, both intentionally and unintentionally.

May we be given the chance to meet again in the next Ramadan.

And I hope you continue to be a strong person, capable of facing whatever life brings with grace and resilience.`;
// typing effect
let i = 0;
function typing() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i) === "\n" ? "<br><br>" : message.charAt(i);
        i++;
        setTimeout(typing, 35);
    }
}

// ================== START ==================
function start() {
    document.getElementById("opening").style.display = "none";
    document.getElementById("content").classList.add("show");

    setTimeout(() => {
        document.getElementById("foto").classList.add("show");
    }, 500);

    setTimeout(() => {
        typing();
    }, 1000);

    document.getElementById("music").play();
}

// ================== BINTANG ==================
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

function createStar() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 80 + 10,
        speed: Math.random() * 5 + 2,
        opacity: Math.random()
    };
}

for (let i = 0; i < 30; i++) {
    stars.push(createStar());
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach((star, i) => {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255," + star.opacity + ")";
        ctx.lineWidth = 2;
        ctx.moveTo(star.x, star.y);
        ctx.lineTo(star.x - star.length, star.y + star.length);
        ctx.stroke();

        star.x -= star.speed;
        star.y += star.speed;

        if (star.x < 0 || star.y > canvas.height) {
            stars[i] = createStar();
            stars[i].x = canvas.width;
            stars[i].y = 0;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
